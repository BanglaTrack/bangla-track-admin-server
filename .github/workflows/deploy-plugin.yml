name: Deploy Plugin to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.SERVER_PORT }}" -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "echo connected"

      - name: Deploy via rsync
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "*.zip" \
            -e "ssh -p ${{ secrets.SERVER_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new" \
            ./ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PLUGIN_PATH }}/"

      - name: Done
        run: echo "Deployment completed successfully."
