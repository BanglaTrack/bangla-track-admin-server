name: Deploy Plugin To cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SCP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build deployment archive
        run: |
          tar --exclude-vcs --exclude-from='.rsyncignore' --exclude='plugin.tar.gz' -czf /tmp/plugin.tar.gz .
          mv /tmp/plugin.tar.gz plugin.tar.gz

      - name: Upload archive via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          source: plugin.tar.gz
          target: ${{ secrets.CPANEL_PLUGIN_PATH }}

      - name: Extract archive on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: ${{ secrets.CPANEL_PORT }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.CPANEL_PLUGIN_PATH }}"
            command -v tar >/dev/null 2>&1 || { echo "tar not found on remote host"; exit 1; }
            tar -xzf plugin.tar.gz
            # Keep deployment/control artifacts out of live plugin directory.
            rm -rf .git .github
            rm -f .rsyncignore
            rm -f plugin.tar.gz
